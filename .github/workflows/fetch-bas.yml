name: Fetch BAS Kpm Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

# Don't run on data-only commits (pushed by the other fetch workflow)
# This workflow only triggers on schedule/manual, never on push

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch BAS data
        run: node scripts/fetch-bas.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/bas-kpm.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update BAS Kpm data"
          git pull --rebase || true
          git push
