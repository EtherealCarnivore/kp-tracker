name: Fetch BAS Kpm Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

# Don't run on data-only commits (pushed by the other fetch workflow)
# This workflow only triggers on schedule/manual, never on push

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch BAS data
        run: node scripts/fetch-bas.js

      - name: Commit and push if changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/bas-kpm.json
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update BAS Kpm data"
          git pull --rebase || true
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
